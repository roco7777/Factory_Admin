name: factory_admin
description: "Punto de Venta y Administración."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  intl: 0.20.2
  mobile_scanner: ^7.1.3
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1
  screenshot: ^3.0.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  audioplayers: ^5.2.1
  pdf: ^3.11.3
  printing: ^5.14.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: "^2.4.0"
  flutter_lints: ^6.0.0 # <-- Movido aquí (su lugar correcto)

# CONFIGURACIÓN DE ICONOS (Fondo Negro)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icono_f.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/icono_f.png" # Corregido: añadida la carpeta /icon/

# CONFIGURACIÓN DE SPLASH (Fondo Rojo)
flutter_native_splash:
  color: "#ED3237"
  image: "assets/images/logo_factory.png" # Corregido: añadida la carpeta /icon/
  android_12:
    image: "assets/images/logo_factory.png"
    color: "#ED3237"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/beep.mp3    
    - assets/images/